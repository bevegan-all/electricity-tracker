<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Bill Submission</title>
    <style>
        /* Base Styles */
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary-color: #f1f5f9;
            --secondary-hover: #e2e8f0;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --bg-color: #f8fafc;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh;
        }

        .container { 
            width: 100%; max-width: 650px; background: white; padding: 40px; 
            border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box;
        }

        h2 { text-align: center; color: var(--text-main); margin-top: 0; margin-bottom: 8px; font-size: 24px; font-weight: 700; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--text-main); }

        input[type="text"], input[type="date"], input[type="file"] { 
            width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); 
            border-radius: 8px; box-sizing: border-box; font-size: 15px; font-family: inherit; transition: all 0.2s ease;
        }
        input[type="text"]:focus, input[type="date"]:focus, input[type="file"]:focus {
            outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        input[type="file"] { padding: 10px; color: var(--text-muted); }
        input[type="file"]::file-selector-button {
            padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border-color);
            background-color: var(--secondary-color); color: var(--text-main); font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-right: 15px;
        }
        input[type="file"]::file-selector-button:hover { background-color: var(--secondary-hover); }

        .bill-section { background: #ffffff; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 20px; border-radius: 8px; }
        .bill-section-title { font-size: 16px; font-weight: 700; color: var(--primary-color); margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--secondary-hover); }

        .btn { padding: 14px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; transition: all 0.2s ease; font-family: inherit; margin-bottom: 15px;}
        .btn-add { background-color: var(--secondary-color); color: var(--text-main); border: 1px dashed #94a3b8; }
        .btn-add:hover { background-color: var(--secondary-hover); border-style: solid; }
        .btn-submit { background-color: var(--primary-color); color: white; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2); }
        .btn-submit:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none !important; }

        .error { color: var(--error-color); font-size: 13px; margin-top: 6px; font-weight: 500; }

        /* --- NEW MODAL STYLES --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); text-align: center;
        }
        #progressStatusText { font-weight: 600; font-size: 18px; margin-bottom: 15px; color: var(--text-main); }
        
        .progress-bar-bg { width: 100%; height: 14px; background-color: #e2e8f0; border-radius: 20px; overflow: hidden; margin-bottom: 12px; }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--primary-color); border-radius: 20px; transition: width 0.4s ease; }
        
        .progress-stats { display: flex; justify-content: space-between; font-size: 14px; color: var(--text-muted); font-weight: 500; }
        .modal-close-btn { 
            display: none; margin-top: 20px; padding: 10px 20px; background: var(--secondary-color); 
            border: none; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%;
        }
        .modal-close-btn:hover { background: var(--secondary-hover); }

        @media (max-width: 600px) { .container { padding: 25px 20px; } body { padding: 10px; } }
    </style>
</head>
<body>

<div class="container">
    <h2>Electricity Bill Collection</h2>
    <div class="subtitle">Please submit 2 to 5 recent electricity bills</div>
    
    <form id="uploadForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="e.g. Omkar Bhujbal" required>
        </div>
        <div class="form-group">
            <label>Class</label>
            <input type="text" id="studentClass" placeholder="e.g. SY BCA E3" required>
        </div>
        <div class="form-group">
            <label>Roll No</label>
            <input type="text" id="rollNo" placeholder="e.g. SE3305" required>
        </div>

        <div id="billsContainer">
            </div>

        <button type="button" id="addBillBtn" class="btn btn-add" onclick="addBillSection()">+ Add Another Electricity Bill</button>
        <button type="submit" id="submitBtn" class="btn btn-submit">Submit Documents</button>
    </form>
</div>

<div id="uploadModal" class="modal-overlay">
    <div class="modal-content">
        <div id="progressStatusText">Preparing files...</div>
        <div class="progress-bar-bg">
            <div id="progressBarFill" class="progress-bar-fill"></div>
        </div>
        <div class="progress-stats">
            <span id="progressPercent">0%</span>
            <span id="progressTime">Calculating...</span>
        </div>
        <button id="modalCloseBtn" class="modal-close-btn" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
    let billCount = 0;
    const maxBills = 5;
    const maxFileSize = 5 * 1024 * 1024; // 5 MB

    // PASTE YOUR NEW VERSION 2 WEB APP URL HERE
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwx3S-SgSQElOLpEiNNtiCABbMHFpg9vWAkEulYw7hvolBkyceR9CGXeNve-0Ahi9KTIw/exec'; 

    window.onload = () => { addBillSection(); addBillSection(); };

    function addBillSection() {
        if (billCount >= maxBills) return;
        billCount++;
        const container = document.getElementById('billsContainer');
        const section = document.createElement('div');
        section.className = 'bill-section';
        section.innerHTML = `
            <div class="bill-section-title">Electricity Bill ${billCount}</div>
            <div class="form-group">
                <label style="font-weight: 500;">Bill Date</label>
                <input type="date" class="bill-date" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label style="font-weight: 500;">Upload Document (Image/PDF, Max 5MB)</label>
                <input type="file" class="bill-file" accept="image/*,application/pdf" required onchange="checkFileSize(this)">
                <div class="error" style="display:none;">⚠️ File exceeds 5MB limit!</div>
            </div>
        `;
        container.appendChild(section);
        if (billCount === maxBills) document.getElementById('addBillBtn').style.display = 'none';
    }

    function checkFileSize(input) {
        if (input.files && input.files[0]) {
            if (input.files[0].size > maxFileSize) {
                input.nextElementSibling.style.display = 'block';
                input.value = ""; 
            } else {
                input.nextElementSibling.style.display = 'none';
            }
        }
    }

    const getBase64 = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
            let encoded = reader.result.toString().replace(/^data:(.*,)?/, '');
            if ((encoded.length % 4) > 0) encoded += '='.repeat(4 - (encoded.length % 4));
            resolve(encoded);
        };
        reader.onerror = error => reject(error);
    });

    function closeModal() {
        document.getElementById('uploadModal').style.display = 'none';
        document.getElementById('modalCloseBtn').style.display = 'none';
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('addBillBtn').disabled = false;
    }

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const dates = document.querySelectorAll('.bill-date');
        const filesInputs = document.querySelectorAll('.bill-file');
        
        if (filesInputs.length < 2) {
            alert("Please upload at least 2 electricity bills.");
            return;
        }

        // Lock form and show Modal
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('addBillBtn').disabled = true;
        
        document.getElementById('uploadModal').style.display = 'flex';
        document.getElementById('progressBarFill').style.width = '0%';
        document.getElementById('progressPercent').innerText = '0%';
        document.getElementById('progressStatusText').innerText = 'Uploading data securely...';
        document.getElementById('progressBarFill').style.backgroundColor = 'var(--primary-color)';
        document.getElementById('modalCloseBtn').style.display = 'none';

        try {
            let processedBills = [];
            let totalBytes = 0;

            for (let i = 0; i < filesInputs.length; i++) {
                const fileObj = filesInputs[i].files[0];
                totalBytes += fileObj.size; 
                const base64Data = await getBase64(fileObj);
                processedBills.push({ date: dates[i].value, filename: fileObj.name, mimeType: fileObj.type, base64: base64Data });
            }

            const payload = {
                name: document.getElementById('name').value,
                studentClass: document.getElementById('studentClass').value,
                rollNo: document.getElementById('rollNo').value,
                bills: processedBills
            };

            let estimatedSeconds = Math.max((totalBytes / 300000), 5); 
            let currentProgress = 0;
            
            // Progress Bar Animation
            const progressInterval = setInterval(() => {
                currentProgress += (100 / estimatedSeconds) * 0.5; 
                if (currentProgress > 95) {
                    currentProgress = 95; // Hold at 95%
                    document.getElementById('progressStatusText').innerText = 'Saving to Google Drive...';
                }
                document.getElementById('progressBarFill').style.width = currentProgress + '%';
                document.getElementById('progressPercent').innerText = Math.round(currentProgress) + '%';
                let timeRemaining = Math.max(Math.round(estimatedSeconds - (currentProgress/100 * estimatedSeconds)), 1);
                document.getElementById('progressTime').innerText = `~${timeRemaining}s remaining`;
            }, 500); 

            // Network Request
            const response = await fetch(scriptURL, {
                method: 'POST',
                // Explicitly omitted Content-Type header to bypass strict CORS preflight checks
                body: JSON.stringify(payload)
            });

            const textResponse = await response.text();
            clearInterval(progressInterval);

            try {
                const result = JSON.parse(textResponse);
                
                if (result.status === "error") {
                    // This catches the Duplicate Roll No error!
                    document.getElementById('progressBarFill').style.backgroundColor = 'var(--error-color)';
                    document.getElementById('progressStatusText').innerText = 'Submission Failed';
                    document.getElementById('progressTime').innerText = result.message;
                    document.getElementById('modalCloseBtn').style.display = 'block';
                } else if (result.status === "success") {
                    document.getElementById('progressBarFill').style.width = '100%';
                    document.getElementById('progressPercent').innerText = '100%';
                    document.getElementById('progressTime').innerText = 'Complete!';
                    document.getElementById('progressStatusText').innerText = 'Success!';
                    document.getElementById('progressBarFill').style.backgroundColor = 'var(--success-color)';
                    
                    setTimeout(() => {
                        alert("Documents submitted successfully!");
                        document.getElementById('uploadForm').reset();
                        window.location.reload(); 
                    }, 800);
                }
            } catch (jsonError) {
                // If Google blocks the JSON response but the files uploaded anyway
                document.getElementById('progressBarFill').style.backgroundColor = '#f59e0b'; // warning color
                document.getElementById('progressStatusText').innerText = 'Upload Sent!';
                document.getElementById('progressTime').innerText = 'Please check with Admin to confirm receipt.';
                document.getElementById('modalCloseBtn').style.display = 'block';
            }

        } catch (error) {
            console.error(error);
            document.getElementById('progressBarFill').style.backgroundColor = 'var(--error-color)';
            document.getElementById('progressStatusText').innerText = 'Network Disconnected';
            document.getElementById('progressTime').innerText = 'Check your internet and try again.';
            document.getElementById('modalCloseBtn').style.display = 'block';
        }
    });
</script>

</body>
</html>
